name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  gradle-tests:
    name: Gradle Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Checkout WebAssembly testsuite
        uses: actions/checkout@v6
        with:
          repository: WebAssembly/testsuite
          path: build/external-testsuites/wasm
          ref: 88e97b0f742f4c3ee01fea683da130f344dd7b02

      - name: Checkout WASI testsuite
        uses: actions/checkout@v6
        with:
          repository: WebAssembly/wasi-testsuite
          path: build/external-testsuites/wasi
          ref: prod/testsuite-base

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run tests
        run: ./gradlew --no-daemon test --continue
        env:
          GRADLE_OPTS: "-ea"

  docs:
    name: Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Publish local artifacts for docs snippets
        run: ./gradlew --no-daemon publishToMavenLocal -x test

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs
        working-directory: docs
        run: npm run build

      - name: Test docs snippets
        working-directory: docs
        run: npm test -- --runInBand
