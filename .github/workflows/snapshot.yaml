name: Snapshot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    name: Publish Snapshot And Docs
    runs-on: ubuntu-latest
    if: github.repository == 'Shusek/kotlin-runtime-web-assembly'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Publish local artifacts for docs snippets
        run: ./gradlew --no-daemon publishToMavenLocal -x test

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Build Docusaurus site
        working-directory: docs
        run: npm run build

      - name: Test docs snippets
        working-directory: docs
        run: npm test -- --runInBand

      - name: Prepare Pages site
        run: |
          set -euo pipefail
          rm -rf build/pages
          mkdir -p build/pages
          rsync -a docs/build/ build/pages/
          touch build/pages/.nojekyll

      - name: Publish snapshot artifacts
        run: ./gradlew --no-daemon -Pkrwa.githubPagesMavenRepository="$PWD/build/pages/maven" publishAllPublicationsToGithubPagesRepository -x test

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages-${{ github.run_attempt }}
          path: build/pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-${{ github.run_attempt }}
